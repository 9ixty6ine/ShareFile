version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: securevault-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-securevault}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: securevault-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-securevault}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      JWT_SECRET: ${JWT_SECRET:-changeme_please}
      STORAGE_DIR: /app/storage/files
      FRONTEND_URL: http://localhost
    volumes:
      - file_storage:/app/storage
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    container_name: securevault-frontend
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
  file_storage: